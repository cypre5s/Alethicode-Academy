<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Alethicode Academy — 编程学园恋物语</title>
  <meta name="author" content="dhu_cypress, assisted with opus" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0a0814" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="dns-prefetch" href="https://api.minimaxi.com" />
  <link rel="preconnect" href="https://api.minimaxi.com" crossorigin />
  <link rel="modulepreload" href="/src/main.js" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #app { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
    @font-face { font-display: swap; }
    #app-loader { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(180deg, #0a0814, #1a1228); z-index: 9999; transition: opacity 0.6s; }
    #app-loader.hide { opacity: 0; pointer-events: none; }
    .loader-ring { width: 48px; height: 48px; border: 3px solid rgba(232,160,191,0.2);
      border-top-color: #e8a0bf; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { margin-top: 16px; color: rgba(255,220,180,0.6); font-size: 14px; letter-spacing: 0.1em; font-family: system-ui; }
  </style>
</head>
<body>
  <div id="app-loader">
    <div style="text-align:center">
      <div class="loader-ring"></div>
      <div class="loader-text">Loading...</div>
    </div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
  <script>
    window.addEventListener('load', () => {
      const loader = document.getElementById('app-loader')
      if (loader) { loader.classList.add('hide'); setTimeout(() => loader.remove(), 600) }
    })
  </script>
</body>
</html>
